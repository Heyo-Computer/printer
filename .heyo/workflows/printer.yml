name: Printer CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  printer:
    name: Verify and build printer
    runs-on: namespace-profile-default
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Verify printer
        run: |
          set -euo pipefail
          workspace="${CI_WORKSPACE:-$PWD}"

          cargo fmt --manifest-path "${workspace}/printer/Cargo.toml" --check
          cargo clippy --manifest-path "${workspace}/printer/Cargo.toml" -- -D warnings
          cargo test --manifest-path "${workspace}/printer/Cargo.toml"

      - name: Build printer
        run: |
          set -euo pipefail
          workspace="${CI_WORKSPACE:-$PWD}"

          cargo build --manifest-path "${workspace}/printer/Cargo.toml" --release
