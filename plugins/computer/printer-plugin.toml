# Hooks and assets the `computer` plugin contributes when installed.
# Ships the `computer` skill (Wayland desktop automation for driving and
# verifying UI changes) and exposes it to both implementation and review
# agents on every `printer run` / `printer exec` invocation, so impl turns
# can click-test a UI change they just made and review turns can confirm it.

assets = ["skills"]

# --- Implementation phase ------------------------------------------------

# Available during impl turns so an agent that just touched a UI/web surface
# can exercise it end-to-end (e.g. `computer browse <url>`, screenshot, click
# through) before declaring the task done.
[[hooks]]
type = "agent"
event = "before_run"
skill = "skills/computer/SKILL.md"

# --- Review phase --------------------------------------------------------

[[hooks]]
type = "agent"
event = "before_review"
skill = "skills/computer/SKILL.md"
