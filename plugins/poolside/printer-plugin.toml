# Poolside ACP agent for printer.
#
# Skill + agent plugin: the `poolside` CLI is shipped by Poolside itself
# (see https://docs.poolside.ai/cli/editor-integration#editor-integration-acp);
# this plugin only registers the launch glue. No binary is built here.
#
# Prereq: the `poolside` binary must be on $PATH. See README.md.

assets = ["skills"]

[[agent]]
kind = "acp"
name = "poolside"
command = "poolside"
# `acp` selects Poolside CLI's ACP server mode. Confirm against
# docs.poolside.ai if Poolside renames the subcommand.
args = ["acp"]

# Env left empty by default; users opt in via host env or shell profile
# (e.g. POOLSIDE_API_KEY). To inject one statically, uncomment:
# env = { POOLSIDE_LOG = "info" }

# --- Agent skill ---------------------------------------------------------
#
# Brief the implementer that it is the Poolside model and should follow the
# user's existing project conventions.

[[hooks]]
type  = "agent"
event = "before_run"
skill = "skills/poolside/SKILL.md"
