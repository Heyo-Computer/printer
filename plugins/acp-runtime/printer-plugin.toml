# Shared ACP runtime briefing for printer.
#
# Skill-only plugin: contributes one `before_run` skill that explains the
# ACP wire contract (one printer turn = one `session/prompt`, session
# lifetime spans the printer invocation, etc.). Vendor-specific plugins
# (`poolside`, `opencode`, future `claude-code-acp`) layer their own
# briefings on top — this plugin holds the common bits so they don't get
# duplicated across vendors.
#
# No `[[agent]]` block: this plugin doesn't define a launchable agent on
# its own. Install it alongside any ACP vendor plugin to get the shared
# runtime contract briefed in.

assets = ["skills"]

[[hooks]]
type  = "agent"
event = "before_run"
skill = "skills/acp-runtime/SKILL.md"
