# Hooks and assets the codegraph plugin contributes when installed.
# See ../../printer/HOOKS.md for the schema.

assets = ["skills"]

# --- Run phase ------------------------------------------------------------

# Refresh the codegraph index at the start of every run, so search/snippet
# results reflect the working tree. Warn-not-fail because environments may
# not have codegraph on PATH; we don't want to abort the whole run for that.
[[hooks]]
type = "cli"
event = "before_run"
command = "codegraph index"
on_failure = "warn"

# Tell the implementer agent to prefer codegraph for navigation and edits.
[[hooks]]
type = "agent"
event = "before_run"
command = "Prefer `codegraph` over grep + Read for searching and reading source: use `codegraph search`, `codegraph definition`, `codegraph outline`, `codegraph snippet`. For edits, build a unified diff and apply it with `codegraph patch <file>` instead of using Edit/Write to rewrite files; use `codegraph patch --check` to dry-run when the context is unsure."

# Make the search and edit skills available to the implementer.
[[hooks]]
type = "agent"
event = "before_run"
skill = "skills/codegraph-search/SKILL.md"

[[hooks]]
type = "agent"
event = "before_run"
skill = "skills/codegraph-edit/SKILL.md"

# --- Review phase --------------------------------------------------------

# Reviewer doesn't edit, only navigates — expose only the search skill.
[[hooks]]
type = "agent"
event = "before_review"
skill = "skills/codegraph-search/SKILL.md"
