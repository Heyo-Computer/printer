# Opencode ACP agent for printer.
#
# Skill + agent plugin: the `opencode` CLI is shipped by sst/opencode
# (https://github.com/sst/opencode); this plugin only registers the
# launch glue. No binary is built here.
#
# Drives via `opencode acp` — opencode's first-class ACP server mode.
# Distinct from printer's *built-in* `--agent opencode` (one-shot
# `opencode run --prompt …` per turn): use `--agent acp:opencode-acp`
# to reach this plugin for persistent ACP semantics.
#
# Prereq: the `opencode` binary must be on $PATH.

assets = ["skills"]

[[agent]]
kind = "acp"
name = "opencode-acp"
command = "opencode"
# `acp` is opencode's documented subcommand for the ACP server mode
# (see `opencode --help`). If sst/opencode renames the subcommand the
# fix is here; nothing else in printer's ACP transport assumes a
# particular subcommand name.
args = ["acp"]

# Env left empty by default. Opencode reads provider credentials from
# its own config (`opencode auth` / per-provider env vars). No printer-
# side configuration needed unless you want to inject a vendor-
# specific key statically.

# --- Agent skill ---------------------------------------------------------
#
# Brief the implementer that it is the Opencode model and should follow
# the user's existing project conventions. The generic ACP runtime
# contract (one turn = one `session/prompt`, etc.) is *not* duplicated
# here — install the bundled `acp-runtime` plugin alongside this one
# to get that briefing.

[[hooks]]
type  = "agent"
event = "before_run"
skill = "skills/opencode/SKILL.md"
