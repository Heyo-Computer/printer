# Hooks and driver the `heyvm` plugin contributes when installed.
#
# Skill-only / driver-only plugin: heyvm itself is an external CLI shipped from
# https://docs.heyo.computer, so there is no Cargo crate here. Installing this
# plugin registers a sandbox driver that dispatches every agent turn through
# `heyvm exec`, plus a before_run skill so the agent understands it is
# running inside a worktree.
#
# Prereq: the `heyvm` binary must be on $PATH. See README.md.

assets = ["skills"]

# --- Sandbox driver -------------------------------------------------------

[driver]
kind = "vm"

# Provision a sandbox with the host cwd bind-mounted at /workspace. heyvm's
# normal create output is multi-line and would corrupt the captured handle,
# so we redirect heyvm's stdout to stderr (still visible to the user) and
# echo the deterministic slug — that's the {handle} for every later step.
#
# Mounts:
#   {cwd}:/workspace                    — the host repo, RW. The agent's cwd.
#   $HOME/.claude:$HOME/.claude         — claude code's state dir, RW. Without
#       this, heyvm's bubblewrap default exposes $HOME read-only, which
#       makes every claude `Bash` tool call fail to mkdir
#       ~/.claude/session-env/<uuid>, and breaks session resume across
#       printer's rotation boundary (claude's per-session jsonl can't
#       persist). Bind-mounting RW lets claude reuse host credentials and
#       write session state. The sandbox can mutate host ~/.claude; for
#       stricter isolation override `enter` to set HOME to an in-sandbox
#       writable path and copy credentials in via `post_create`.
#   $HOME/.local/state:$HOME/.local/state — XDG state base, RW. Standard
#       Linux convention for ephemeral runtime state, logs, and per-session
#       data ($XDG_STATE_HOME default). Agents that hardcode
#       `~/.local/state/<name>/` (e.g. poolside writing
#       `~/.local/state/poolside/pool/logs/`) would otherwise EROFS on the
#       bubblewrap-default ro $HOME bind. Mounting RW from host lets any
#       well-behaved agent that follows XDG-state convention work; the
#       host dir is created by the preamble so a user who has never
#       populated it doesn't fail the bind.
#   $HOME/.cache:$HOME/.cache             — XDG cache base, RW. Same
#       reasoning as .local/state — agent caches (model artifacts,
#       prompt-token caches, etc.) need a writable destination.
#   $HOME is expanded by the outer printer `sh -c`, so different host
#   users Just Work.
#
# `--needs-network` is required for agents that hit external APIs (claude
# code / codex). `--no-ttl` keeps the sandbox alive for the full exec.
#
# `mkdir -p` ensures the XDG host dirs exist before the bind: a fresh user
# may not have populated them, and `heyvm create --mount` errors if the
# host source path is missing.
create = "mkdir -p $HOME/.local/state $HOME/.cache && heyvm create --name printer-{spec_slug} --image {base_image} --no-ttl --needs-network --mount {cwd}:/workspace --mount $HOME/.claude:$HOME/.claude --mount $HOME/.local/state:$HOME/.local/state --mount $HOME/.cache:$HOME/.cache >&2 && echo printer-{spec_slug}"

# After create succeeds, set cwd to the bind-mount once. We use a persistent
# heyvm session ("printer") that retains cwd across exec calls, so every
# subsequent `enter` inherits /workspace as the working directory.
post_create = "cd /workspace"

# `{child}` is the agent's argv, shell-quoted token-by-token by printer
# (drivers.rs::shell_quote_argv). The outer printer `sh -c` parses those
# tokens into separate argv elements, which heyvm then passes verbatim to
# the persistent session shell — so we do *not* wrap with another `sh -c`
# (that double-shells and mangles the argv). `--session printer` makes cwd
# and exported env stick across consecutive `heyvm exec` calls; the cwd is
# set to /workspace once via `post_create` and then inherited by every
# subsequent agent turn.
#
# IS_SANDBOX=1 tells claude code to allow `--dangerously-skip-permissions`
# even though heyvm sandboxes run as root. Without it, claude refuses with
# "cannot be used with root/sudo privileges". This is safe here because
# the sandbox itself provides the isolation that bypassPermissions would
# otherwise compromise on the host.
enter = "heyvm exec {handle} --session printer --env IS_SANDBOX=1 -- {child}"

# Bind mount means file edits round-trip live — no separate push/pull.

destroy = "heyvm delete -y {handle}"

# --- Agent skill ----------------------------------------------------------

[[hooks]]
type  = "agent"
event = "before_run"
skill = "skills/heyvm-sandbox/SKILL.md"
